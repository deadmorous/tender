name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q clang-format cmake ninja-build gcc-14 g++-14

      - name: Check formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format --dry-run --Werror

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DTENDER_BUILD_TESTS=ON \
            -DTENDER_BUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  python-bindings:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q cmake ninja-build gcc-14 g++-14 python3-dev python3-pip
          pip3 install pytest

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DTENDER_BUILD_TESTS=OFF \
            -DTENDER_BUILD_PYTHON=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Python tests
        run: |
          cd build/python
          PYTHONPATH=. pytest test_tender.py -v

  notebooks-clean:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Check notebooks have no stored output
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys

          failures = []
          for nb_path in sorted(pathlib.Path(".").rglob("*.ipynb")):
              nb = json.loads(nb_path.read_text())
              for i, cell in enumerate(nb.get("cells", [])):
                  if cell.get("cell_type") != "code":
                      continue
                  if cell.get("outputs", []) != []:
                      failures.append(f"{nb_path}: cell {i} has stored outputs")
                  if cell.get("execution_count") is not None:
                      failures.append(f"{nb_path}: cell {i} has execution_count set")
          if failures:
              print("Notebooks with stored output (run nbstripout and recommit):")
              for msg in failures:
                  print(" ", msg)
              sys.exit(1)
          nb_count = len(list(pathlib.Path(".").rglob("*.ipynb")))
          print(f"All {nb_count} notebook(s) clean.")
          EOF

  coverage:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q cmake ninja-build gcc-14 g++-14 gcovr

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DTENDER_BUILD_TESTS=ON \
            -DTENDER_BUILD_COVERAGE=ON \
            -DTENDER_BUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Coverage
        run: cmake --build build --target coverage
